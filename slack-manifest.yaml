display_information:
  name: Boletus
  description: "Your AI team \u2014 powered by Boletus"
  background_color: "#1a1a2e"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Boletus
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:manage
      - channels:history
      - channels:read
      - channels:join
      - app_mentions:read
      - im:history
      - im:write
      - im:read
      - files:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
